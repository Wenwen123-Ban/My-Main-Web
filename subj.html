<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Subjects — Read Only</title>
  <style>
    body{font-family: Arial, sans-serif;margin:16px;color:#222}
    .container{max-width:900px;margin:0 auto}
    h1{margin-bottom:6px}
    .semester{font-weight:700;margin-bottom:12px}
    .day-block{margin-top:12px}
    .day-header{background:#f3f3f3;padding:6px 8px;font-weight:700;border-radius:4px}
    .subject-row{display:flex;gap:12px;align-items:center;padding:8px;border-bottom:1px solid #eee}
    .subject-row .time{width:140px;color:#666}
    .subject-row .code{width:90px;font-weight:700;color:#2a7a2a}
    .subject-row .desc{flex:1}
    .note{color:#666;margin-top:12px}
  </style>
</head>
<body>
  <div class="container">
    <h1>Subject Schedule</h1>
    <div id="semester" class="semester"></div>
    <div id="listArea">Loading subjects…</div>
    <p class="note">This page is read-only. Edit <strong>subjects.json</strong> manually to change the lists.</p>
    <p><a href="index.html">Back to Home</a></p>
  </div>

  <script src="script.js"></script>
  <script>
    const DAY_NAMES = { M: 'MONDAY', T: 'TUESDAY', W: 'WEDNESDAY', TH: 'THURSDAY', F: 'FRIDAY' };
    const DAY_KEYS = ['M','T','W','TH','F'];

    async function renderReadOnlySubjects() {
      const listArea = document.getElementById('listArea');
      listArea.innerHTML = '';

      const data = await fetchSubjectsData();
      if (!data) { listArea.textContent = 'Failed to load subjects.json'; return; }

      const activeGroup = getActiveSemesterGroup(data);
      if (!activeGroup) { listArea.innerHTML = '<p>No active semester group found.</p>'; return; }

      // show semester
      const semEl = document.getElementById('semester');
      semEl.textContent = activeGroup.semester || '';

      // control flag: show_groups
      if (!activeGroup.show_groups) {
        listArea.innerHTML = '<p>Subject groups are disabled for the active semester.</p>';
        return;
      }

      const subjects = activeGroup.subjects || [];
      const byDay = { M: [], T: [], W: [], TH: [], F: [] };
      subjects.forEach(s => { if (byDay[s.day]) byDay[s.day].push(s); });

      DAY_KEYS.forEach(key => {
        const list = byDay[key] || [];
        const block = document.createElement('div');
        block.className = 'day-block';

        const header = document.createElement('div');
        header.className = 'day-header';
        header.textContent = DAY_NAMES[key];
        block.appendChild(header);

        if (!list.length) {
          const empty = document.createElement('div'); empty.textContent='(no subjects)'; empty.style.color='#666'; empty.style.padding='8px'; block.appendChild(empty);
        } else {
          list.sort((a,b)=> timeToMinutes(a.time_start)-timeToMinutes(b.time_start));
          list.forEach(s=>{
            const row = document.createElement('div'); row.className='subject-row';
            row.innerHTML = `\n              <div class="time">${minutesToDisplay(s.time_start)} – ${minutesToDisplay(s.time_end)}</div>\n              <div class="code">${s.code}</div>\n              <div class="desc">${s.description}</div>`;
            block.appendChild(row);
          });
        }

        listArea.appendChild(block);
      });

    }

    document.addEventListener('DOMContentLoaded', renderReadOnlySubjects);
  </script>
</body>
</html>

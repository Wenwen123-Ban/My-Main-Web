    <style>
        .dropbtn {
  background-color: #04AA6D;
  color: white;
  padding: 8px 12px;
  font-size: 13px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

/* The container <div> - needed to position the dropdown content */
.dropdown {
  position: relative;
  display: inline-block;
}

/* Dropdown Content (Hidden by Default) */
.dropdown-content {
    display: none;
    position: absolute;
    background-color: #f1f1f1;
    min-width: 160px;
    max-width: calc(100vw - 24px); /* never exceed the viewport width */
    right: 0; /* align the dropdown's right edge with the button's right edge */
    left: auto;
    max-height: 180px; /* show up to five items, then scroll */
    overflow-y: auto;
    box-shadow: 0px 6px 12px 0px rgba(0,0,0,0.15);
    z-index: 1;
    border-radius: 4px;
}

/* Links inside the dropdown */
.dropdown-content a {
    color: black;
    padding: 8px 12px;
    text-decoration: none;
    display: block;
    font-size: 13px;
    height: 36px; /* fixed item height to ensure exactly five visible */
    box-sizing: border-box;
    line-height: 20px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* Change color of dropdown links on hover */
.dropdown-content a:hover {background-color: #ddd;}

/* Small custom scrollbar for dropdown */
.dropdown-content::-webkit-scrollbar { width: 8px; }
.dropdown-content::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.15); border-radius: 4px; }

/* Show the dropdown menu when active */
.dropdown-content.active {display: block;}

/* Change the background color of the dropdown button when active */
.dropbtn.active {background-color: #3e8e41;}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #333;
    padding: 6px 12px;
}

header {
    max-width: 980px;
    margin: 0 auto 18px; /* push nav below header */
    padding: 10px 12px;
    box-sizing: border-box;
    position: relative;
}

#semester {
    margin-top: 6px;
    color: #333;
    font-weight: 600;
    text-align: center;
}

.page-semester{max-width:980px;margin:8px auto 18px;text-align:center;color:#333;font-weight:600}

/* Style the list to look like a horizontal menu */
nav ul {
    list-style-type: none;
    margin: 0;
    padding: 0;
    display: flex;
    gap: 20px;
}

nav ul li a {
    color: white;
    text-decoration: none;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 3px;
    transition: background-color 0.2s ease;
}

nav ul li a:hover {
    background-color: rgba(255, 255, 255, 0.2);
}

/* Today's subjects styles */
.today-container {
    max-width: 800px;
    margin: 12px auto;
    padding: 0 16px;
    font-family: Arial, sans-serif;
}
.subject-row {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #eee;
    flex-wrap: wrap;
}
.subject-row .time {
    width: 140px;
    color: #555;
    font-size: 0.95rem;
    min-width: 120px;
}
.subject-row .code {
    width: 80px;
    font-weight: 700;
    color: #2a7a2a;
    min-width: 60px;
}
.subject-row .desc {
    flex: 1;
}

html {
    scroll-behavior: smooth;
}

@media (max-width: 720px) {
    nav {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
    }
    nav ul {
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
    }
    .dropdown {
        align-self: flex-end;
    }
    .today-container {
        padding: 0 12px;
    }
    .subject-row {
        gap: 8px;
    }
    .subject-row .time,
    .subject-row .code {
        width: auto;
        min-width: 0;
    }
}

@media (max-width: 520px) {
    body {
        margin: 0;
    }
    header {
        padding: 12px 10px;
    }
    .dropbtn {
        width: 100%;
        text-align: center;
    }
    .dropdown-content {
        min-width: 100%;
        right: auto;
        left: 0;
    }
    .today-container {
        padding: 0 10px;
    }
    .subject-row {
        flex-direction: column;
        align-items: flex-start;
        padding: 10px 0;
    }
    .subject-row .time,
    .subject-row .code,
    .subject-row .desc {
        width: 100%;
    }
    .subject-row .time {
        font-size: 0.95rem;
    }
    nav ul li a {
        padding: 8px 10px;
        font-size: 12px;
    }
}

<script>
    function updateDateTime() {
    const now = new Date();
    // This turns the date/time into a readable string
    document.getElementById("date-time").innerHTML = now.toLocaleString();
}

// Update the time immediately when the page loads
updateDateTime();

// Run the function every 1000 milliseconds (1 second)
setInterval(updateDateTime, 1000);

// Dropdown button click functionality
const dropbtn = document.querySelector('.dropbtn');
const dropdownContent = document.querySelector('.dropdown-content');

if (dropbtn) {
    dropbtn.addEventListener('click', function() {
        dropdownContent.classList.toggle('active');
        dropbtn.classList.toggle('active');
    });
}

// Close dropdown when clicking elsewhere on the page
document.addEventListener('click', function(event) {
    if (!event.target.closest('.dropdown')) {
        dropdownContent.classList.remove('active');
        dropbtn.classList.remove('active');
    }
});

// Load and render today's subjects (features + schedule across visible groups)
async function loadTodaySubjects() {
    const container = document.getElementById('today-subjects');
    if (!container) return;

    const data = await fetchSubjectsData();
    if (!data) { container.innerHTML = '<p>Failed to load subjects.json.</p>'; return; }

    const groups = Array.isArray(data.semester_groups) ? data.semester_groups : [data];
    const featureGroups = groups.filter(g => g.show_index_feature && Array.isArray(g.subjects));
    const scheduleGroups = groups.filter(g => g.show_groups && Array.isArray(g.subjects));

    const semEl = document.getElementById('semester');
    if (semEl) {
        semEl.textContent = featureGroups.length === 1 ? featureGroups[0].semester : (scheduleGroups.length === 1 ? scheduleGroups[0].semester : 'Multiple semesters');
    }

    const featuredSection = document.getElementById('featured');
    const featuredContainer = document.getElementById('featured-subject');
    featuredContainer.innerHTML = '';

    if (featureGroups.length) {
        featuredSection.style.display = 'block';
        const featuredList = featureGroups.flatMap(group => {
            return (group.subjects || []).map(s => ({ ...s, semester: group.semester, isFeatured: s.id === group.featured_subject_id }));
        }).sort((a, b) => timeToMinutes(a.time_start, a.time_start_is_am) - timeToMinutes(b.time_start, b.time_start_is_am));

        if (!featuredList.length) {
            featuredSection.style.display = 'none';
        } else {
            featuredList.forEach(subject => {
                const block = document.createElement('div');
                block.className = 'subject-row';
                const featuredNote = subject.isFeatured ? ' <strong>(featured)</strong>' : '';
                block.innerHTML = `\n                    <div class="time">${minutesToDisplay(subject.time_start, subject.time_start_is_am)} – ${minutesToDisplay(subject.time_end, subject.time_end_is_am)}</div>\n                    <div class="code">${subject.code}</div>\n                    <div class="desc"><strong>${subject.semester}</strong>: ${subject.description}${featuredNote}</div>`;
                featuredContainer.appendChild(block);
            });
        }
    } else {
        featuredSection.style.display = 'none';
    }

    if (!scheduleGroups.length) {
        container.innerHTML = '<p>No subject schedule available for the active semester.</p>';
        return;
    }

    const todayCode = getTodayCode();
    if (!todayCode) {
        container.innerHTML = '<p>No classes today — it\'s the weekend.</p>';
        return;
    }

    const allTodaySubjects = scheduleGroups.flatMap(group => {
        return (group.subjects || [])
            .filter(s => s.day === todayCode)
            .map(s => ({ ...s, semester: group.semester }));
    }).sort((a, b) => timeToMinutes(a.time_start, a.time_start_is_am) - timeToMinutes(b.time_start, b.time_start_is_am));

    if (!allTodaySubjects.length) {
        container.innerHTML = '<p>No subjects registered for today.</p>';
        return;
    }

    container.innerHTML = allTodaySubjects.map(s => `\n        <div class="subject-row">\n            <span class="time">${minutesToDisplay(s.time_start, s.time_start_is_am)} – ${minutesToDisplay(s.time_end, s.time_end_is_am)}</span>\n            <span class="code">${s.code}</span>\n            <span class="desc">${s.description} <em>(${s.semester})</em></span>\n        </div>`).join('');
}

// Ensure subjects and other UI load after DOM ready
document.addEventListener('DOMContentLoaded', function () {
    loadTodaySubjects();
});
</script>

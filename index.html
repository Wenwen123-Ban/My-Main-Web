<head>
    <meta charset="UTF-8">

    <title>Main</title>
    <style>
        .dropbtn {
  background-color: #04AA6D;
  color: white;
  padding: 8px 12px;
  font-size: 13px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

/* The container <div> - needed to position the dropdown content */
.dropdown {
  position: relative;
  display: inline-block;
}

/* Dropdown Content (Hidden by Default) */
.dropdown-content {
    display: none;
    position: absolute;
    background-color: #f1f1f1;
    min-width: 160px;
    max-width: calc(100vw - 24px); /* never exceed the viewport width */
    right: 0; /* align the dropdown's right edge with the button's right edge */
    left: auto;
    max-height: 180px; /* show up to five items, then scroll */
    overflow-y: auto;
    box-shadow: 0px 6px 12px 0px rgba(0,0,0,0.15);
    z-index: 1;
    border-radius: 4px;
}

/* Links inside the dropdown */
.dropdown-content a {
    color: black;
    padding: 8px 12px;
    text-decoration: none;
    display: block;
    font-size: 13px;
    height: 36px; /* fixed item height to ensure exactly five visible */
    box-sizing: border-box;
    line-height: 20px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* Change color of dropdown links on hover */
.dropdown-content a:hover {background-color: #ddd;}

/* Small custom scrollbar for dropdown */
.dropdown-content::-webkit-scrollbar { width: 8px; }
.dropdown-content::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.15); border-radius: 4px; }

/* Show the dropdown menu when active */
.dropdown-content.active {display: block;}

/* Change the background color of the dropdown button when active */
.dropbtn.active {background-color: #3e8e41;}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #333;
    padding: 6px 12px;
}

/* Style the list to look like a horizontal menu */
nav ul {
    list-style-type: none;
    margin: 0;
    padding: 0;
    display: flex;
    gap: 20px;
}

nav ul li a {
    color: white;
    text-decoration: none;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 3px;
    transition: background-color 0.2s ease;
}

nav ul li a:hover {
    background-color: rgba(255, 255, 255, 0.2);
}

/* Today's subjects styles */
.today-container {
    max-width: 800px;
    margin: 12px auto;
    padding: 0 16px;
    font-family: Arial, sans-serif;
}
.subject-row {
    display: flex;

    border-bottom: 1px solid #eee;
}
.subject-row .time {
    width: 140px;
    color: #555;
    font-size: 0.95rem;
}
.subject-row .code {
    width: 80px;
    font-weight: 700;
    color: #2a7a2a;
}
.subject-row .desc {
    flex: 1;
}

html {
    scroll-behavior: smooth;
}

    </style>

<script>
    function updateDateTime() {
    const now = new Date();
    // This turns the date/time into a readable string
    document.getElementById("date-time").innerHTML = now.toLocaleString();
}

// Update the time immediately when the page loads
updateDateTime();

// Run the function every 1000 milliseconds (1 second)
setInterval(updateDateTime, 1000);

// Dropdown button click functionality
const dropbtn = document.querySelector('.dropbtn');
const dropdownContent = document.querySelector('.dropdown-content');

if (dropbtn) {
    dropbtn.addEventListener('click', function() {
        dropdownContent.classList.toggle('active');
        dropbtn.classList.toggle('active');
    });
}

// Close dropdown when clicking elsewhere on the page
document.addEventListener('click', function(event) {
    if (!event.target.closest('.dropdown')) {
        dropdownContent.classList.remove('active');
        dropbtn.classList.remove('active');
    }
});

// Load and render today's subjects
async function loadTodaySubjects() {
    const container = document.getElementById('today-subjects');
    if (!container) return;

    const data = await fetchSubjectsData();
    const activeGroup = getActiveSemesterGroup(data);

    const semEl = document.getElementById('semester');
    if (semEl) {
        semEl.textContent = (activeGroup && activeGroup.semester) ? activeGroup.semester : '';
    }

    const featuredSection = document.getElementById('featured');
    const featuredContainer = document.getElementById('featured-subject');
    if (activeGroup && activeGroup.show_index_feature && activeGroup.featured_subject_id) {
        const featured = (activeGroup.subjects || []).find(s => s.id === activeGroup.featured_subject_id);
        if (featured) {
            featuredSection.style.display = 'block';
            featuredContainer.innerHTML = `\n                <div class="subject-row">\n                    <span class="time">${minutesToDisplay(featured.time_start)} – ${minutesToDisplay(featured.time_end)}</span>\n                    <span class="code">${featured.code}</span>\n                    <span class="desc">${featured.description}</span>\n                </div>`;
            return;
        }
    }

    if (!activeGroup || !activeGroup.show_groups) {
        container.innerHTML = '<p>No subject schedule available for the active semester.</p>';
        return;
    }

    const todayCode = getTodayCode();
    if (!todayCode) {
        container.innerHTML = '<p>No classes today — it\'s the weekend.</p>';
        return;
    }

    const todaySubjects = (activeGroup.subjects || []).filter(s => s.day === todayCode)
        .sort((a, b) => timeToMinutes(a.time_start) - timeToMinutes(b.time_start));

    if (!todaySubjects.length) {
        container.innerHTML = '<p>No subjects registered for today.</p>';
        return;
    }

    container.innerHTML = todaySubjects.map(s => `\n        <div class="subject-row">\n            <span class="time">${minutesToDisplay(s.time_start)} – ${minutesToDisplay(s.time_end)}</span>\n            <span class="code">${s.code}</span>\n            <span class="desc">${s.description}</span>\n        </div>`).join('');
}

// Ensure subjects and other UI load after DOM ready
document.addEventListener('DOMContentLoaded', function () {
    loadTodaySubjects();
});
</script>

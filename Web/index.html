<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main</title>
    <style>
        .dropbtn {
  background-color: #04AA6D;
  color: white;
  padding: 8px 12px;
  font-size: 13px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

/* The container <div> - needed to position the dropdown content */
.dropdown {
  position: relative;
  display: inline-block;
}

/* Dropdown Content (Hidden by Default) */
.dropdown-content {
    display: none;
    position: absolute;
    background-color: #f1f1f1;
    min-width: 160px;
    max-width: calc(100vw - 24px); /* never exceed the viewport width */
    right: 0; /* align the dropdown's right edge with the button's right edge */
    left: auto;
    max-height: 180px; /* show up to five items, then scroll */
    overflow-y: auto;
    box-shadow: 0px 6px 12px 0px rgba(0,0,0,0.15);
    z-index: 1;
    border-radius: 4px;
}

/* Links inside the dropdown */
.dropdown-content a {
    color: black;
    padding: 8px 12px;
    text-decoration: none;
    display: block;
    font-size: 13px;
    height: 36px; /* fixed item height to ensure exactly five visible */
    box-sizing: border-box;
    line-height: 20px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* Change color of dropdown links on hover */
.dropdown-content a:hover {background-color: #ddd;}

/* Small custom scrollbar for dropdown */
.dropdown-content::-webkit-scrollbar { width: 8px; }
.dropdown-content::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.15); border-radius: 4px; }

/* Show the dropdown menu when active */
.dropdown-content.active {display: block;}

/* Change the background color of the dropdown button when active */
.dropbtn.active {background-color: #3e8e41;}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #333;
    padding: 6px 12px;
}

/* Style the list to look like a horizontal menu */
nav ul {
    list-style-type: none;
    margin: 0;
    padding: 0;
    display: flex;
    gap: 20px;
}

nav ul li a {
    color: white;
    text-decoration: none;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 3px;
    transition: background-color 0.2s ease;
}

nav ul li a:hover {
    background-color: rgba(255, 255, 255, 0.2);
}

html {
    scroll-behavior: smooth;
}

    </style>
</head>
<body>
    <header>
        <h1 class="heading" style="color: green; text-align: center;" >Welcome to the Main Page</h1>
        <p class="text" style="text-align: center;">Multi Purpose Project</p>
        <div id="date-time" style="font-weight: bold; margin-bottom: 20px;"></div>

    </header>
  <nav>
      <ul>
         <li><a href="index.html">Home</a></li>
         <li><a href="#intro">Introducing</a></li>
         <li><a href="#features">Projects</a></li>
         <li><a href="#">About</a></li>
      </ul>
      <div class="dropdown">
         <button class="dropbtn">Dropdown</button>
         <div class="dropdown-content">
             <a href="#">Link 1</a>
             <a href="#">Link 2</a>
             <a href="#">Link 3</a>
             <a href="#">Link 1</a>
             <a href="#">Link 2</a>
             <a href="#">Link 3</a>
         </div>
     </div>
  </nav>

 
  <section id="intro">
    <hr>
      <h1>Introduction</h1>
      <p>Welcome to my document project...</p>
   </section>

  <section id="features">
    <hr>
      <h2>Features</h2>
      <p>Here is what this project can do...</p> 
  </section>

</body>
<script>
    function updateDateTime() {
    const now = new Date();
    // This turns the date/time into a readable string
    document.getElementById("date-time").innerHTML = now.toLocaleString();
}

// Update the time immediately when the page loads
updateDateTime();

// Run the function every 1000 milliseconds (1 second)
setInterval(updateDateTime, 1000);

// Dropdown button click functionality
const dropbtn = document.querySelector('.dropbtn');
const dropdownContent = document.querySelector('.dropdown-content');

if (dropbtn) {
    dropbtn.addEventListener('click', function() {
        dropdownContent.classList.toggle('active');
        dropbtn.classList.toggle('active');
    });
}

// Close dropdown when clicking elsewhere on the page
document.addEventListener('click', function(event) {
    if (!event.target.closest('.dropdown')) {
        dropdownContent.classList.remove('active');
        dropbtn.classList.remove('active');
    }
});
</script>
</html>
